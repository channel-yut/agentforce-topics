<template>
    <article class="slds-card">
        <!-- History Banner (visible only in history detail mode) -->
        <template if:true={isHistoryDetail}>
            <div class="slds-box slds-theme_shade history-banner">
                <lightning-icon icon-name="utility:history" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                {labels.historyBanner}
            </div>
        </template>

        <!-- Card Header -->
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <lightning-button-icon icon-name={collapseIconName} variant="border-filled" alternative-text="折りたたみ/展開" title="折りたたみ/展開" class="slds-m-right_x-small" onclick={handleToggleCollapse}></lightning-button-icon>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <span class="slds-text-heading_small">{headerTitle}</span>
                    </h2>
                    <p class="slds-text-body_small slds-text-color_weak">{headerSubtitle}</p>
                </div>
            </header>
            <div class="slds-no-flex">
                <template if:true={showLatestView}>
                    <lightning-button label={labels.btnShowHistory} variant="neutral" onclick={handleShowHistory}></lightning-button>
                </template>
                <template if:true={showHistoryList}>
                    <lightning-button label={labels.btnBackToLatest} variant="neutral" onclick={handleShowLatest}></lightning-button>
                </template>
                <template if:true={showHistoryDetail}>
                    <lightning-button label={labels.btnBackToList} variant="neutral" onclick={handleShowHistoryList}></lightning-button>
                </template>
            </div>
        </div>

        <!-- Card Body -->
        <div class="slds-card__body slds-card__body_inner" if:false={isCollapsed}>
            <!-- Loading State -->
            <template if:true={isLoading}>
                <div class="slds-align_absolute-center slds-p-around_large">
                    <lightning-spinner alternative-text={labels.loading}></lightning-spinner>
                </div>
            </template>

            <!-- Error State -->
            <template if:true={error}>
                <div class="slds-p-around_medium">
                    <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <h2>エラーが発生しました</h2>
                    </div>
                </div>
            </template>

            <!-- Latest/Detail View -->
            <template if:true={showInsightView}>
                <template if:true={currentTopic}>
                    <!-- Meta Info -->
                    <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                        <div class="slds-col">
                            <span class="slds-text-body_small slds-text-color_weak">
                                <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                                {formattedDate}
                            </span>
                            <template if:true={currentTopic.Trigger_Type__c}>
                                <lightning-badge label={currentTopic.Trigger_Type__c} class="slds-m-left_small"></lightning-badge>
                            </template>
                            <template if:true={currentTopic.Summary__c}>
                                <span class="slds-text-body_small slds-m-left_small">{currentTopic.Summary__c}</span>
                            </template>
                        </div>
                        <template if:false={isHistoryDetail}>
                            <div class="slds-col slds-no-flex">
                                <span class="slds-text-body_small slds-text-color_weak slds-m-right_small">{labels.feedbackQuestion}</span>
                                <lightning-button-icon icon-name="utility:like" variant="border-filled"
                                    alternative-text={labels.feedbackHelpful} title={labels.feedbackHelpful} onclick={handleThumbsUp}
                                    class={thumbsUpClass}></lightning-button-icon>
                                <lightning-button-icon icon-name="utility:dislike" variant="border-filled"
                                    alternative-text={labels.feedbackNotHelpful} title={labels.feedbackNotHelpful} onclick={handleThumbsDown}
                                    class={thumbsDownClass}></lightning-button-icon>
                            </div>
                        </template>
                    </div>

                    <!-- Rich Text Content -->
                    <div class="insight-container slds-box slds-theme_default">
                        <lightning-formatted-rich-text value={currentTopic.Content__c}></lightning-formatted-rich-text>
                    </div>

                    <!-- Footer Actions -->
                    <div class="slds-m-top_medium slds-border_top slds-p-top_medium">
                        <div class="slds-grid slds-grid_align-end slds-gutters_small">
                            <div class="slds-col">
                                <lightning-button label={labels.shareSlack} variant="base"
                                    icon-name="utility:share" onclick={handleShareSlack}></lightning-button>
                            </div>
                            <div class="slds-col">
                                <lightning-button label={labels.copyToClipboard} variant="base"
                                    icon-name="utility:copy" onclick={handleCopyToClipboard}></lightning-button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- No Data State -->
                <template if:false={currentTopic}>
                    <div class="no-data-container slds-p-around_large">
                        <lightning-icon icon-name="utility:info" size="small" alternative-text={labels.noData}></lightning-icon>
                        <p class="slds-text-body_regular">{labels.noDataMsg}</p>
                    </div>
                </template>
            </template>

            <!-- History List View -->
            <template if:true={showHistoryList}>
                <template if:true={hasHistory}>
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">
                                    <div class="slds-truncate" title={labels.colDate}>{labels.colDate}</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title={labels.colTrigger}>{labels.colTrigger}</div>
                                </th>
                                <th scope="col">
                                    <div class="slds-truncate" title={labels.colSummary}>{labels.colSummary}</div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={filteredHistoryTopics} for:item="topic">
                                <tr key={topic.Id} class="slds-hint-parent" data-id={topic.Id} onclick={handleViewDetail}>
                                    <td data-label={labels.colDate}>
                                        <lightning-formatted-date-time value={topic.Generated_Date__c}
                                            year="numeric" month="2-digit" day="2-digit"
                                            hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                    </td>
                                    <td data-label={labels.colTrigger}>
                                        <template if:true={topic.Trigger_Type__c}>
                                            <lightning-badge label={topic.Trigger_Type__c}></lightning-badge>
                                        </template>
                                    </td>
                                    <td data-label={labels.colSummary}>
                                        <div class="slds-truncate" title={topic.Summary__c}>{topic.Summary__c}</div>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

                <!-- No History State -->
                <template if:false={hasHistory}>
                    <div class="no-data-container slds-p-around_large">
                        <lightning-icon icon-name="utility:info" size="small" alternative-text={labels.noHistory}></lightning-icon>
                        <p class="slds-text-body_regular">{labels.noHistoryMsg}</p>
                    </div>
                </template>
            </template>
        </div>
    </article>
</template>
