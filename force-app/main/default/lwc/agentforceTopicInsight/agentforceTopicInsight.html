<template>
    <!-- Meta Row: Date + Trigger Type + Subject + feedback slot -->
    <div class="topic-meta slds-m-bottom_medium">
        <div class="topic-meta-left">
            <template if:true={formattedDate}>
                <span class="slds-text-body_small slds-text-color_weak">
                    <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                    {formattedDate}
                </span>
            </template>
            <template if:true={topic.Trigger_Type__c}>
                <lightning-badge label={topic.Trigger_Type__c} class="slds-m-left_small"></lightning-badge>
            </template>
            <template if:true={topic.Subject__c}>
                <span class="topic-subject slds-m-left_small">{topic.Subject__c}</span>
            </template>
        </div>
        <div class="topic-meta-right">
            <slot name="feedback"></slot>
        </div>
    </div>

    <!-- Rich Text Content -->
    <div class="insight-container">
        <lightning-formatted-rich-text value={topic.Content__c}></lightning-formatted-rich-text>
    </div>

    <!-- Related Record Link Cards -->
    <template if:true={hasRelatedLinks}>
        <div class="slds-m-top_medium">
            <div class="related-links-grid">
                <template for:each={relatedRecords} for:item="rec">
                    <a key={rec.recordId} href={rec.url} target="_blank" class="related-link-card">
                        <lightning-icon icon-name={rec.iconName} size="small" class="slds-m-right_x-small"></lightning-icon>
                        <span class="related-link-label">{rec.label}</span>
                    </a>
                </template>
                <template if:true={isLoadingLinks}>
                    <div class="related-link-card related-link-card_loading">
                        <lightning-spinner size="x-small" alternative-text="読み込み中"></lightning-spinner>
                    </div>
                </template>
            </div>
        </div>
    </template>
</template>
