<template>
    <div class="preview-wrapper">
        <div class="preview-header">
            <lightning-icon icon-name="utility:preview" size="xx-small" alternative-text="preview"></lightning-icon>
            <span class="preview-label">コンテンツ プレビュー</span>
        </div>
        <template lwc:if={topic}>
            <c-agentforce-topic-insight topic={topic}></c-agentforce-topic-insight>
        </template>
        <template lwc:if={record.error}>
            <p class="preview-error">データを読み込めませんでした。</p>
        </template>
    </div>
</template>
