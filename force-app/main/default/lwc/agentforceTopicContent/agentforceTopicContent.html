<template>
    <div class="preview-wrapper">
        <div class="preview-header">
            <lightning-icon icon-name="utility:preview" size="xx-small" alternative-text="preview"></lightning-icon>
            <span class="preview-label">コンテンツ プレビュー</span>
        </div>
        <template lwc:if={record.data}>
            <p class="preview-summary">{subject}</p>
            <div class="preview-divider"></div>
            <div class="preview-content">
                <lightning-formatted-rich-text value={content}></lightning-formatted-rich-text>
            </div>
        </template>
        <template lwc:if={record.error}>
            <p class="preview-error">データを読み込めませんでした。</p>
        </template>
    </div>
</template>
